services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: crm-web
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      DATABASE_URL: postgres://crm:crm@postgres:5432/crm
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build: .
    container_name: crm-bot
    command: python -m bot.main
    env_file: .env
    environment:
      DATABASE_URL: postgres://crm:crm@postgres:5432/crm
      CRM_API_BASE_URL: http://web:8000
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started

  qcluster:
    build: .
    container_name: crm-qcluster
    command: python manage.py qcluster
    env_file: .env
    environment:
      DATABASE_URL: postgres://crm:crm@postgres:5432/crm
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
